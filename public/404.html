<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting to /</title>
    <script>
      // Single Page Application for GitHub Pages
      // Redirect to the main page with the original path
      var segmentCount = 1; // how many path segments to consider
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, segmentCount + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/') +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
